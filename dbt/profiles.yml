# dbt profile — Databricks (Delta + Unity Catalog). Values come from env vars.
# Medallion layers set their own +schema (silver/gold); the schema below is the
# fallback for anything without an explicit +schema.
airhealth:
  target: databricks
  outputs:
    databricks:
      type: databricks
      host: "{{ env_var('DATABRICKS_HOST', '') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH', '') }}"
      token: "{{ env_var('DATABRICKS_TOKEN', '') }}"
      catalog: "{{ env_var('DBX_CATALOG', 'airhealth') }}"
      schema: "{{ env_var('DBX_GOLD_SCHEMA', 'gold') }}"
      threads: 4
