name: "airhealth"
version: "1.0.0"
config-version: 2

profile: "airhealth"

model-paths: ["models"]
seed-paths: ["seeds"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

seeds:
  airhealth:
    +schema: silver
    metros:
      +column_types:
        metro_key: varchar
        county_fips: varchar
        state: varchar

# Medallion architecture:
#   bronze = raw ingested data (produced by ingestion/ -> the `bronze` schema)
#   silver = cleaned/typed/conformed + joined to grain (dbt views)
#   gold   = business-ready dims/facts/marts for DS + DA (dbt tables)
models:
  airhealth:
    silver:
      +materialized: view
      +schema: silver
    gold:
      +materialized: table
      +schema: gold
