name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Unit tests
        run: pytest

      # The warehouse (Delta) + dbt transforms + models run on Databricks.
      # CI validates that ingestion produces valid parquet in sample mode.
      - name: Ingestion smoke (sample mode -> parquet)
        run: |
          cp .env.example .env
          python -m ingestion.run_ingest
          test -f data/raw/county_annual/dt=static/data.parquet
