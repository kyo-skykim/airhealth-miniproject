name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Unit tests
        run: pytest

      - name: Run pipeline (sample mode, DuckDB)
        run: |
          cp .env.example .env
          python -m ingestion.run_ingest
          python -m ingestion.load_warehouse

      - name: dbt build + test
        working-directory: dbt
        env:
          DUCKDB_PATH: ${{ github.workspace }}/data/warehouse.duckdb
          DBT_PROFILES_DIR: .
        run: dbt build

      - name: Train models
        run: python -m ds.run_models
